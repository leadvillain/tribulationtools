<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a202c;
            margin: 0;
            color: #e2e8f0;
        }

        .container {
            background: #2d3748;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* Essential for formatting the grid */
        #output {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: #1a202c;
            border: 1px solid #4a5568;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            line-height: 1.8;
            color: #63b3ed;
            /* This ensures the \n characters in JS create new lines */
            white-space: pre-wrap;
            letter-spacing: 1px;
            text-align: left;
        }

        button {
            background-color: #3182ce;
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #4299e1;
            box-shadow: 0 0 15px rgba(66, 153, 225, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>OTP Generator</h2>
        <button id="generateBtn">Generate</button>
        <div id="output">Prepare to copy</div>
    </div>

    <script>
        const charset = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

        function generateFormattedGrid() {
            let finalOutput = "";
            const totalCharsNeeded = 5 * 5 * 5; // 125 total characters
            const randomValues = new Uint32Array(totalCharsNeeded);

            // Get all random entropy at once for efficiency
            window.crypto.getRandomValues(randomValues);

            let valIndex = 0;

            for (let line = 0; line < 5; line++) {
                let currentLine = [];

                for (let set = 0; set < 5; set++) {
                    let currentSet = "";
                    for (let char = 0; char < 5; char++) {
                        currentSet += charset[randomValues[valIndex] % charset.length];
                        valIndex++;
                    }
                    currentLine.push(currentSet);
                }

                // Join sets with a space and add a newline at the end of the line
                finalOutput += currentLine.join(" ") + "\n";
            }

            return finalOutput.trim();
        }

        const button = document.getElementById('generateBtn');
        const display = document.getElementById('output');

        button.addEventListener('click', () => {
            display.textContent = generateFormattedGrid();
        });
    </script>

</body>
</html>
