<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random String Generator</title>
    <style>
        /* CSS: Formatting the layout and output */
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f7f6;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }

        /* The 'Result' box formatting */
        #output {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: #eef2f3;
            border: 2px dashed #cbd5e0;
            border-radius: 6px;
            font-family: 'Courier New', Courier, monospace; /* Monospace for clarity */
            font-size: 1.5rem;
            font-weight: bold;
            color: #2d3748;
            letter-spacing: 2px;
            word-break: break-all;
            min-height: 1.5rem;
        }

        button {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #357abd;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>String Generator</h2>
        <p>Click below to generate a secure random string.</p>

        <button id="generateBtn">Generate String</button>

        <div id="output">--------</div>
    </div>

    <script>
        // JS: The logic
        function generateRandomString(length) {
            const charset = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let result = "";
            const randomValues = new Uint32Array(length);
            window.crypto.getRandomValues(randomValues);

            for (let i = 0; i < length; i++) {
                result += charset[randomValues[i] % charset.length];
            }
            return result;
        }

        // Connecting the logic to the UI
        const button = document.getElementById('generateBtn');
        const display = document.getElementById('output');

        button.addEventListener('click', () => {
            // You can change '12' to whatever length you need
            const newString = generateRandomString(125);
            display.textContent = newString;
        });
    </script>

</body>
</html>
